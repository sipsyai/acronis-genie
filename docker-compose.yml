services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: acronis-pgvector
    environment:
      POSTGRES_DB: acronis_agent
      POSTGRES_USER: acronis
      POSTGRES_PASSWORD: acronis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acronis -d acronis_agent"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
